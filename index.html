<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobmaze</title>
    <style>
        body { font-family: Arial, sans-serif; }
        header { display: flex; justify-content: space-between; padding: 10px; background-color: #f0f0f0; }
        .settings { margin-right: 10px; }
        .theme-switcher { display: none; }
    </style>
</head>
<body>
<header>
    <div class="settings">
        <button id="settingsButton">Settings</button>
    </div>
</header>

<main>
    <h1>Welcome to Mobmaze</h1>
    <!-- Main game content goes here -->
</main>

<div id="themeSwitcher" class="theme-switcher">
    <h2>Choose Theme:</h2>
    <button onclick="setTheme('white')">White</button>
    <button onclick="setTheme('system')">System</button>
    <button onclick="setTheme('black')">Black</button>
    <button onclick="goHome()">Home</button>
</div>

<script>
    document.getElementById('settingsButton').onclick = function() {
        var themeSwitcher = document.getElementById('themeSwitcher');
        themeSwitcher.style.display = themeSwitcher.style.display === 'none' ? 'block' : 'none';
    };

    function setTheme(theme) {
        document.body.className = theme;
        console.log('Theme set to:', theme);
    }

    function goHome() {
        window.location.href = '/'; // Redirects to the main game page
    }
</script>
</body>
</html>
